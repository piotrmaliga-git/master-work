name: Merge Frontend check

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:ci

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e -- --grep-invert "@visual"

  e2e-visual-tests:
    name: E2E visual tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E visual tests
        run: npm run e2e:visual -- --grep "@visual"

  e2e-visual-tests-rtl:
    name: E2E visual tests RTL
    runs-on: ubuntu-latest
    needs: e2e-tests
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E visual tests RTL
        run: npm run e2e:visual-rtl -- --grep "@visual"

  mutation-tests:
    name: Mutation tests
    runs-on: ubuntu-latest
    needs: [e2e-visual-tests, e2e-visual-tests-rtl]
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Mutation tests
        run: npm run mutate
