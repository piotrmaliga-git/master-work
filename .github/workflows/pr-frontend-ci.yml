name: PR Frontend check

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  lint-format:
    name: Lint & format
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & format
        run: npm run lint

  check-translations:
    name: Check translations
    runs-on: ubuntu-latest
    needs: lint-format
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check duplicate translation keys (XLF)
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const localeDir = path.join(process.cwd(), 'src', 'locale');
          if (!fs.existsSync(localeDir)) {
            console.log('No locale directory found, skipping duplication check.');
            process.exit(0);
          }

          const files = fs
            .readdirSync(localeDir)
            .filter((fileName) => fileName.endsWith('.xlf'));

          if (files.length === 0) {
            console.log('No XLF files found, skipping duplication check.');
            process.exit(0);
          }

          const unitIdRegex = /<(?:unit|trans-unit)\b[^>]*\bid="([^"]+)"/g;
          let hasDuplicateKeys = false;

          for (const fileName of files) {
            const filePath = path.join(localeDir, fileName);
            const content = fs.readFileSync(filePath, 'utf8');
            const keyCounts = new Map();

            for (const match of content.matchAll(unitIdRegex)) {
              const key = match[1];
              keyCounts.set(key, (keyCounts.get(key) || 0) + 1);
            }

            const duplicates = [...keyCounts.entries()]
              .filter(([, count]) => count > 1)
              .sort(([a], [b]) => a.localeCompare(b));

            if (duplicates.length > 0) {
              hasDuplicateKeys = true;
              console.error(`Duplicate translation keys in ${fileName}:`);
              for (const [key, count] of duplicates) {
                console.error(`  - ${key} (x${count})`);
              }
            }
          }

          if (hasDuplicateKeys) {
            process.exit(1);
          }

          console.log('No duplicate translation keys found in XLF files.');
          NODE

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: check-translations
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:ci

  mutation-tests:
    name: Mutation tests
    runs-on: ubuntu-latest
    needs: check-translations
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Mutation tests
        run: npm run mutate

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [unit-tests, mutation-tests]
    defaults:
      run:
        working-directory: phishing-email-analyzer/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phishing-email-analyzer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e
