<p-card
  data-testid="info-card"
  i18n-header="info|Card title for available models section@@info.cardHeader"
  header="Available Models"
  styleClass="info-card"
>
  <ul class="model-list">
    @for (model of models(); track model.name) {
      <li>
        <strong class="model-name">{{ model.name }}: </strong>
        <span class="model-description">{{ model.description }}</span>
      </li>
    }
  </ul>
</p-card>
