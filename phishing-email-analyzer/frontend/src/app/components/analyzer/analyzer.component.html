<div class="p-8 mb-8 bg-white rounded-lg shadow-lg">
  <div class="mb-6">
    <label for="model-select" class="block mb-2 text-sm font-semibold text-gray-700"
      >Select AI Model:</label
    >
    <select
      id="model-select"
      [(ngModel)]="selectedModel"
      [disabled]="loading()"
      class="w-full px-3 py-2 text-sm transition-all duration-300 border-2 border-gray-300 rounded focus:outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 disabled:bg-gray-100 disabled:cursor-not-allowed"
    >
      @for (model of models; track model) {
        <option [value]="model.id">
          {{ model.name }}
        </option>
      }
    </select>
  </div>

  <div class="mb-6">
    <label for="sender-input" class="block mb-2 text-sm font-semibold text-gray-700"
      >Sender Email:</label
    >
    <input
      id="sender-input"
      type="text"
      [(ngModel)]="sender"
      [disabled]="loading()"
      placeholder="e.g. attacker@example.com"
      class="w-full px-3 py-2 text-sm transition-all duration-300 border-2 border-gray-300 rounded focus:outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 disabled:bg-gray-100 disabled:cursor-not-allowed"
    />
  </div>

  <div class="mb-6">
    <label for="title-input" class="block mb-2 text-sm font-semibold text-gray-700"
      >Email Title/Subject:</label
    >
    <input
      id="title-input"
      type="text"
      [(ngModel)]="title"
      [disabled]="loading()"
      placeholder="e.g. Urgent: Verify Your Account"
      class="w-full px-3 py-2 text-sm transition-all duration-300 border-2 border-gray-300 rounded focus:outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 disabled:bg-gray-100 disabled:cursor-not-allowed"
    />
  </div>
  <div class="mb-6">
    <textarea
      id="email-input"
      aria-label="Email content"
      [(ngModel)]="emailText"
      [disabled]="loading()"
      placeholder="Paste email content here..."
      rows="10"
      class="w-full px-3 py-2 font-mono text-sm leading-6 transition-all duration-300 border-2 border-gray-300 rounded resize-none focus:outline-none focus:border-primary focus:ring-4 focus:ring-blue-100 disabled:bg-gray-100 disabled:cursor-not-allowed"
    ></textarea>
    <div class="mt-1 text-xs text-gray-600">{{ emailText().length }} characters</div>
  </div>

  <div class="flex gap-3 mb-5">
    <button
      (click)="onAnalyze()"
      [disabled]="loading() || !emailText().trim()"
      class="flex-1 px-6 py-3 border-none rounded text-base font-semibold cursor-pointer transition-all duration-300 uppercase tracking-wide bg-primary text-white hover:bg-blue-600 hover:shadow-lg hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed"
    >
      {{ loading() ? '⏳ Analyzing...' : '🔍 Analyze' }}
    </button>
    <button
      (click)="clear()"
      [disabled]="loading()"
      class="flex-1 px-6 py-3 border-none rounded text-base font-semibold cursor-pointer transition-all duration-300 uppercase tracking-wide bg-gray-200 text-gray-700 hover:bg-gray-300 hover:-translate-y-0.5 disabled:opacity-60 disabled:cursor-not-allowed"
    >
      🗑️ Clear
    </button>
  </div>

  @if (externalError()) {
    <div class="px-4 py-4 mb-5 font-medium bg-red-100 border-l-4 rounded border-danger text-danger">
      ❌ {{ externalError() }}
    </div>
  }
</div>
