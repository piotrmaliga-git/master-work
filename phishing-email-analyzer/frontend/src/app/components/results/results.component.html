@if (result(); as res) {
  <div class="results-wrapper">
    <p-card
      i18n-header="results|Results card title@@results.cardHeader"
      header="Analysis Result"
      styleClass="results-card"
    >
      <div class="result-row">
        <span i18n="results|Label for analyzed model@@results.model">Model</span>
        <strong>{{ res.model }}</strong>
      </div>
      <div class="result-row">
        <span i18n="results|Label for sender address@@results.sender">Sender</span>
        <strong>{{ res.sender }}</strong>
      </div>
      <div class="result-row">
        <span i18n="results|Label for email subject@@results.title">Title</span>
        <strong>{{ res.title }}</strong>
      </div>
      <div class="result-row">
        <span i18n="results|Label for classification result@@results.prediction">Prediction</span>
        <p-tag
          [value]="res.prediction | uppercase"
          [severity]="res.prediction === 'phishing' ? 'danger' : 'success'"
        />
      </div>

      <div class="reason-block">
        <span i18n="results|Section title for detailed reasoning@@results.detailedAnalysis"
          >Detailed Analysis</span
        >
        <div class="reason-content" [innerHTML]="res.reason | formatReason"></div>
      </div>

      <div class="result-row">
        <span i18n="results|Label for API response time@@results.responseTime">Response Time</span>
        <strong>{{ res.response_time_ms | formatTime }}</strong>
      </div>
      <div class="result-row">
        <span i18n="results|Label for result timestamp@@results.timestamp">Timestamp</span>
        <strong>{{ res.timestamp | date: 'short' }}</strong>
      </div>
    </p-card>
  </div>
}
